<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmaDesk — Chat with Sara</title>
<style>
  :root {
    --wa-dark-green: #075E54;
    --wa-green: #128C7E;
    --wa-light-green: #25D366;
    --wa-bg: #ECE5DD;
    --wa-bubble-in: #FFFFFF;
    --wa-bubble-out: #DCF8C6;
    --wa-text: #111B21;
    --wa-text-dim: #667781;
    --wa-border: #D1D7DB;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0b141a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== CONFIG NOTICE (visible only if API key missing) ===== */
  .config-banner {
    display: none;
    background: #fff3cd;
    color: #664d03;
    padding: 10px 14px;
    font-size: 13px;
    text-align: center;
    border-bottom: 1px solid #ffe69c;
  }

  .phone-frame {
    width: 380px;
    height: 720px;
    background: var(--wa-bg);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 8px solid #1a1a1a;
  }

  /* ===== HEADER ===== */
  .chat-header {
    background: var(--wa-dark-green);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #25D366, #128C7E);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-info { flex: 1; min-width: 0; }
  .header-name { font-weight: 600; font-size: 16px; line-height: 1.2; }
  .header-status { font-size: 12px; opacity: 0.85; line-height: 1.3; }
  .header-status.typing { color: #d3f3df; }

  .header-icons { display: flex; gap: 18px; opacity: 0.9; }

  /* ===== MESSAGES AREA ===== */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 10px;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.015) 0%, transparent 50%);
  }

  .day-divider {
    text-align: center;
    margin: 8px 0 16px;
  }
  .day-divider span {
    background: #E1F2FB;
    color: var(--wa-text-dim);
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 8px;
  }

  .msg-row {
    display: flex;
    margin-bottom: 4px;
  }
  .msg-row.out { justify-content: flex-end; }
  .msg-row.in { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 7px 9px 8px 10px;
    border-radius: 8px;
    font-size: 14.3px;
    line-height: 1.4;
    position: relative;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .bubble.in {
    background: var(--wa-bubble-in);
    color: var(--wa-text);
    border-top-left-radius: 2px;
  }
  .bubble.out {
    background: var(--wa-bubble-out);
    color: var(--wa-text);
    border-top-right-radius: 2px;
  }

  .bubble-time {
    font-size: 11px;
    color: var(--wa-text-dim);
    float: right;
    margin: 4px 0 -4px 8px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .quick-link-btn {
    display: inline-block;
    margin-top: 8px;
    background: var(--wa-light-green);
    color: white;
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 10px 4px;
    align-items: center;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #9aa5ab;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ===== INPUT AREA ===== */
  .input-area {
    background: #F0F2F5;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-box {
    flex: 1;
    background: white;
    border-radius: 22px;
    padding: 9px 16px;
    border: none;
    font-size: 14.5px;
    outline: none;
    color: var(--wa-text);
  }
  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--wa-dark-green);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:disabled { opacity: 0.5; cursor: default; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="config-banner" id="configBanner">
    Add your Groq proxy URL in the CONFIG section of this file to activate live replies.
  </div>

  <div class="chat-header">
    <div class="avatar">S</div>
    <div class="header-info">
      <div class="header-name">Sara · OmaDesk</div>
      <div class="header-status" id="headerStatus">online</div>
    </div>
    <div class="header-icons">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.6 1.6-4.2 0-3.6-2.9-6.5-6.5-6.5S3.3 6.2 3.3 9.8s2.9 6.5 6.5 6.5c1.6 0 3.1-.6 4.2-1.6l.3.3v.9l5 5 1.5-1.5-5-5zm-6 0c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5z"/></svg>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="day-divider"><span>TODAY</span></div>
  </div>

  <div class="input-area">
    <input type="text" class="input-box" id="userInput" placeholder="Type a message" autocomplete="off">
    <button class="send-btn" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/* =========================================================
   CONFIG — edit these values to reuse this widget for any
   business, campaign, or niche.
   ========================================================= */
const CONFIG = {
  GROQ_PROXY_URL: "https://script.google.com/macros/s/AKfycbxa_28GCEVxGbHXpN7Egn77WcmO4B8rEd2-E0MDSuF3b3A0SXexm96_KregHZ4MVyBp/exec",
  SHEET_LOGGER_URL: "https://script.google.com/macros/s/AKfycby2M5WRFT6Dczx77nSdgVxloW047Aqbf5pK81NbsWZaTuL0UERG9SA9uK_oNVCbcYum/exec",
  BOOKING_FORM_URL: "https://tally.so/r/D4bKoN",
  COMPLAINT_FORM_URL: "https://tally.so/r/MePYRX",
  ASSISTANT_NAME: "Sara",
  BUSINESS_NAME: "OmaDesk",
  WELCOME_MESSAGE: "Hi, welcome to OmaDesk! I'm Sara 😊 Ask me anything about our cleaning services, pricing, areas we cover, or how booking works."
};

const FAQ_KNOWLEDGE = `
BUSINESS: OmaDesk Cleaning Services
ASSISTANT NAME: Sara

SERVICES:
- Standard home and apartment cleaning
- Deep cleaning
- Move-in / move-out cleaning
- Post-construction cleaning
- Office and commercial cleaning
- Recurring cleaning plans (weekly, biweekly, monthly)

AREAS COVERED:
We operate in many locations. If the customer mentions a city or country, treat that as their location and tailor tone and currency to it naturally. If they do not mention a location, do not ask twice, just proceed using a moderate, low to mid range US dollar estimate as a general default.

OPERATING DAYS:
We are open every day of the week, including weekends and holidays. There is no day we are closed. Availability on religious or cultural holidays should be treated the same as any other day, we accommodate it normally.

PRICING PHILOSOPHY:
We do not use a single fixed price list. Instead, reason through a fair estimate the way an experienced cleaning business owner would, based on:
- Property type (apartment, house, villa, office)
- Number of bedrooms or approximate size
- Type of cleaning requested (standard, deep, move-out, post-construction, office)
- Customer's stated location, if given, to calibrate cost of living (e.g. a price reasonable in a major US city is different from a price reasonable in a smaller town or a lower cost of living country)

When estimating, think in terms of: a standard 1 bedroom clean is roughly 2 hours of work, a 3 bedroom is roughly 4 hours, a villa or large house is 5 to 8 hours. Deep cleaning and move-out cleaning typically take 1.5x to 2x longer than a standard clean. Use this time estimate plus a reasonable hourly labor rate for the customer's region (if known) or a moderate US-equivalent rate (if unknown) to produce a believable price range, not an exact number. Always phrase it as an estimate range and mention final price is confirmed at booking.

Example of the reasoning style (do not repeat this verbatim, it is just to illustrate the approach): for a 3 bedroom apartment standard clean with no location given, a reasonable estimate is roughly 4 hours of work at a moderate rate, landing somewhere in a $120 to $180 total range. For a villa deep clean, expect more like 6 to 8 hours, landing higher.

MINIMUM BOOKING:
There may be a small minimum charge for very small jobs, mention this only if relevant.

DISCOUNTS:
Discounts are available for recurring bookings, referrals, and long term contracts.

HOW TO BOOK:
If a customer wants to book a cleaning, do not collect their details in chat. Simply let them know you'll send the booking link so they can book in just a minute, and give them the booking link.

COMPLAINTS:
If a customer is unhappy, say sorry first. Ask what happened so you understand. Do not try to fix it yourself in the chat. After listening, give them the complaint link so they can share full details and the team will follow up.

ADVANCE NOTICE:
Recommend booking at least a few hours to a day in advance when possible. Last minute and same day requests are accommodated whenever possible since we operate every day.

RESCHEDULE / CANCELLATION:
Both possible, more notice helps us adjust the schedule, but we stay flexible.

SUPPLIES AND EQUIPMENT:
Our team brings all professional cleaning products and equipment at no extra charge, unless the customer prefers we use their own products.

SAME CLEANER FOR RETURNING CLIENTS:
We try to assign the same team to returning clients when possible, subject to availability.

STAFF TRAINING AND SCREENING:
All cleaning staff are professionally trained, experienced, and screened before joining.

DAMAGE POLICY:
Full responsibility taken for any damage caused by the team. Should be reported immediately for prompt resolution.

PAYMENT METHODS:
Bank transfer, card, and cash are generally accepted, exact options depend on the customer's location, confirmed at booking.

INVOICES:
Formal invoices available for corporate or business clients.

STAFF PREFERENCES (gender, cultural, religious):
Fully respected and accommodated. If a customer requests staff of a specific gender, or has cultural or religious considerations (prayer space cleaning, specific product restrictions, preferred timing around religious observances), accommodate this warmly and confirm it will be arranged.

ECO FRIENDLY OPTIONS:
Available on request, safe for family, pets, and the environment. Fragrance free options available too.

DEEP CLEANING:
Covers areas not included in a regular clean, such as inside appliances, grout, and high surfaces.

MOVE IN / MOVE OUT CLEANING:
Property made spotless before moving in, or restored to a clean handover state before moving out, meeting typical landlord and lease standards.

POST CONSTRUCTION CLEANING:
Specialist service that removes dust, debris, and residue from all surfaces after renovation or building work.

OFFICE / COMMERCIAL CLEANING:
Customized plans available, including after-hours scheduling, priced based on size and frequency.

RECURRING PLANS:
Weekly, biweekly, and monthly plans available with better rates than one-time cleans. Flexible to pause or adjust if circumstances change.

NO SHOW POLICY:
Early notification given if any issue arises, replacement team arranged, booking always honoured.

DISSATISFACTION POLICY:
If not happy with any part of the clean, contact within 24 hours and we will correct it, including a free re-clean of missed areas if needed.

LICENSING:
Registered and licensed cleaning company operating legally wherever we provide service.

INSURANCE:
Carried to protect staff and property during every job.

NO SHOW POLICY:
Early notification given, replacement team arranged, booking always honoured.

RECEIPTS:
Official receipts and invoices available, suitable for company expense claims.

RECLEAN GUARANTEE:
If any area was missed or below standard, the team returns to reclean at no extra charge.

REVIEWS:
A review link is sent after the clean, appreciated but optional.
`;

const SYSTEM_PROMPT = `You are ${CONFIG.ASSISTANT_NAME}, a friendly customer support assistant for ${CONFIG.BUSINESS_NAME}, a cleaning company that serves customers in multiple locations. We are open every day of the week, with no closed days, including weekends and holidays.

Your ONLY job is to answer customer questions using the FAQ knowledge below. Keep replies short, warm, and conversational, like a real WhatsApp message. Use 1-3 short sentences. You may use a single relevant emoji occasionally, never more than one per message.

FAQ KNOWLEDGE:
${FAQ_KNOWLEDGE}

RULES:
1. Only answer using the knowledge above. If something genuinely isn't covered, say you're not sure and offer to connect them with the team.
2. When asked about price, if the customer has not mentioned their location, ask them once where they are located so you can give a more accurate range. If they answer, calibrate your price range to that location. If they don't give a location, or say they'd rather not share it, give your estimate using a moderate, middle of the road US price range, not the cheapest possible number and not a high-end number, just a fair, typical estimate. Always give a real range and a rough time estimate based on the PRICING PHILOSOPHY guidance above. Never refuse to estimate. Always mention the final price is confirmed once booked.
3. If the customer wants to book a cleaning, do not collect their details in chat. Let them know warmly that you'll get them the booking link so they can book in just a minute, then give them the booking link.
4. If the customer has a complaint or is unhappy about something, say sorry first, in a warm and human way. Ask what happened so you understand, and let them know you hear them. Do not try to fix the complaint yourself in chat. After listening, always offer them the complaint link so they can send in the full details and the team can follow up properly.
5. If the customer explicitly asks to speak to a human, agent, or real person, acknowledge warmly and let them know you'll connect them.
6. Your entire response must be ONLY a single JSON object, nothing before it and nothing after it. Do not write a conversational sentence and then also output JSON. Do not repeat the reply text outside the JSON. The JSON object itself is your whole answer, in this exact format:
{"reply": "your conversational reply text", "action": "none" | "booking" | "complaint" | "agent"}

Set "action" to "booking" whenever the customer wants to book and you are giving them the booking link, "complaint" whenever you are giving them the complaint link, "agent" if rule 5 applies, otherwise "none".`;

/* ========================================================= */

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const headerStatus = document.getElementById('headerStatus');
const configBanner = document.getElementById('configBanner');

let conversationHistory = [];
let isWaiting = false;

function checkConfig() {
  if (!CONFIG.GROQ_PROXY_URL || CONFIG.GROQ_PROXY_URL.includes("PASTE_YOUR")) {
    configBanner.style.display = 'block';
    return false;
  }
  return true;
}

function getTime() {
  const d = new Date();
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function addMessage(text, sender, options = {}) {
  const row = document.createElement('div');
  row.className = `msg-row ${sender === 'bot' ? 'in' : 'out'}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender === 'bot' ? 'in' : 'out'}`;
  bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');

  const time = document.createElement('span');
  time.className = 'bubble-time';
  time.textContent = getTime() + (sender === 'user' ? ' ✓✓' : '');
  bubble.appendChild(document.createElement('br'));
  bubble.appendChild(time);

  if (options.linkUrl) {
    const btn = document.createElement('a');
    btn.className = 'quick-link-btn';
    btn.href = options.linkUrl;
    btn.target = '_blank';
    btn.rel = 'noopener';
    btn.textContent = options.linkLabel || 'Open link';
    bubble.appendChild(document.createElement('br'));
    bubble.appendChild(btn);
  }

  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showTyping() {
  headerStatus.textContent = 'typing...';
  headerStatus.classList.add('typing');
  const row = document.createElement('div');
  row.className = 'msg-row in';
  row.id = 'typingRow';
  const bubble = document.createElement('div');
  bubble.className = 'bubble in';
  bubble.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  headerStatus.textContent = 'online';
  headerStatus.classList.remove('typing');
  const row = document.getElementById('typingRow');
  if (row) row.remove();
}

async function logToSheet(question, response) {
  if (!CONFIG.SHEET_LOGGER_URL || CONFIG.SHEET_LOGGER_URL.includes("PASTE_YOUR")) return;
  try {
    await fetch(CONFIG.SHEET_LOGGER_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ question, response })
    });
  } catch (err) {
    console.warn('Logging failed silently:', err);
  }
}

async function callGroq(userText) {
  const messages = [
    { role: "system", content: SYSTEM_PROMPT },
    ...conversationHistory,
    { role: "user", content: userText }
  ];

  const response = await fetch(CONFIG.GROQ_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      messages,
      temperature: 0.4,
      max_tokens: 300
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(`Proxy error: ${response.status} ${errText}`);
  }

  const data = await response.json();

  if (data.error) {
    throw new Error(`Groq API error via proxy: ${JSON.stringify(data.error)}`);
  }

  const rawText = data.choices?.[0]?.message?.content || '';

  let parsed;
  try {
    const cleaned = rawText.replace(/```json|```/g, '').trim();
    const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
    const toParse = jsonMatch ? jsonMatch[0] : cleaned;
    parsed = JSON.parse(toParse);
    if (!parsed.reply) throw new Error('no reply field');
  } catch (e) {
    parsed = { reply: rawText || "Sorry, could you rephrase that?", action: "none" };
  }

  conversationHistory.push({ role: "user", content: userText });
  conversationHistory.push({ role: "assistant", content: rawText });
  if (conversationHistory.length > 16) conversationHistory = conversationHistory.slice(-16);

  return parsed;
}

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  addMessage(text, 'user');
  inputEl.value = '';
  isWaiting = true;
  sendBtn.disabled = true;

  if (!checkConfig()) {
    setTimeout(() => {
      addMessage("Thanks for your message! (Demo mode: add your Groq proxy URL in the CONFIG section to activate live AI replies.)", 'bot');
      isWaiting = false;
      sendBtn.disabled = false;
    }, 500);
    return;
  }

  showTyping();

  try {
    const result = await callGroq(text);
    await new Promise(r => setTimeout(r, 500 + Math.random() * 500));
    hideTyping();

    if (result.action === 'booking') {
      addMessage(result.reply, 'bot', { linkUrl: CONFIG.BOOKING_FORM_URL, linkLabel: '📅 Book Now' });
    } else if (result.action === 'complaint') {
      addMessage(result.reply, 'bot', { linkUrl: CONFIG.COMPLAINT_FORM_URL, linkLabel: '📝 File a Complaint' });
    } else if (result.action === 'agent') {
      addMessage(result.reply, 'bot', { linkUrl: CONFIG.COMPLAINT_FORM_URL.replace('/r/MePYRX',''), linkLabel: '💬 Continue on WhatsApp' });
    } else {
      addMessage(result.reply, 'bot');
    }

    logToSheet(text, result.reply);
  } catch (err) {
    console.error(err);
    hideTyping();
    addMessage("Sorry, I'm having a connection issue right now. Please try again in a moment.", 'bot');
  }

  isWaiting = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', handleSend);
inputEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleSend();
});

// Init
checkConfig();
setTimeout(() => {
  addMessage(CONFIG.WELCOME_MESSAGE, 'bot');
}, 400);
</script>

</body>
</html>
